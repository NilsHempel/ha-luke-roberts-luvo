blueprint:
  name: Adaptive Lighting - Daylight to Warm Night
  description: >
    Automatically adjusts a light's color temperature and brightness based on time of day.
    During the day the light is bright and cool white. In the evening it gradually transitions
    to warm, dim light — ideal for households with small children.
  domain: automation
  input:
    light_entity:
      name: Light
      description: The light entity to control (must support color temperature).
      selector:
        entity:
          domain: light
    day_start:
      name: Day Start
      description: Time when daytime mode begins (bright, cool white).
      default: "08:00:00"
      selector:
        time:
    evening_start:
      name: Evening Start
      description: Time when the evening transition begins (gradual dimming).
      default: "17:00:00"
      selector:
        time:
    night_time:
      name: Night Time
      description: Time when night mode is fully active (warm, dim).
      default: "22:00:00"
      selector:
        time:
    day_brightness:
      name: Day Brightness
      description: Brightness during the day (%).
      default: 100
      selector:
        number:
          min: 1
          max: 100
          step: 5
          unit_of_measurement: "%"
    night_brightness:
      name: Night Brightness
      description: Brightness at night (%).
      default: 10
      selector:
        number:
          min: 1
          max: 100
          step: 5
          unit_of_measurement: "%"
    day_color_temp:
      name: Day Color Temperature
      description: Color temperature during the day (Kelvin).
      default: 4000
      selector:
        number:
          min: 2000
          max: 6500
          step: 100
          unit_of_measurement: K
    night_color_temp:
      name: Night Color Temperature
      description: Color temperature at night (Kelvin).
      default: 2700
      selector:
        number:
          min: 2000
          max: 6500
          step: 100
          unit_of_measurement: K
    update_interval:
      name: Update Interval
      description: How often to adjust the light (minutes).
      default: 5
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: min

trigger:
  - platform: time_pattern
    minutes: !input update_interval
  - platform: state
    entity_id: !input light_entity
    to: "on"

condition:
  - condition: state
    entity_id: !input light_entity
    state: "on"

action:
  - variables:
      day_start: !input day_start
      evening_start: !input evening_start
      night_time: !input night_time
      day_bri: !input day_brightness
      night_bri: !input night_brightness
      day_ct: !input day_color_temp
      night_ct: !input night_color_temp
      now_minutes: "{{ now().hour * 60 + now().minute }}"
      day_minutes: "{{ day_start.split(':')[0] | int * 60 + day_start.split(':')[1] | int }}"
      evening_minutes: "{{ evening_start.split(':')[0] | int * 60 + evening_start.split(':')[1] | int }}"
      night_minutes: "{{ night_time.split(':')[0] | int * 60 + night_time.split(':')[1] | int }}"
  - choose:
      # Daytime: bright cool white
      - conditions:
          - condition: template
            value_template: "{{ now_minutes | int >= day_minutes | int and now_minutes | int < evening_minutes | int }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness_pct: "{{ day_bri | int }}"
              kelvin: "{{ day_ct | int }}"

      # Evening transition: linear interpolation
      - conditions:
          - condition: template
            value_template: "{{ now_minutes | int >= evening_minutes | int and now_minutes | int < night_minutes | int }}"
        sequence:
          - variables:
              total: "{{ night_minutes | int - evening_minutes | int }}"
              elapsed: "{{ now_minutes | int - evening_minutes | int }}"
              fraction: "{{ elapsed / total if total > 0 else 1.0 }}"
              target_bri: "{{ (day_bri | int + (night_bri | int - day_bri | int) * fraction) | round(0) | int }}"
              target_ct: "{{ (day_ct | int + (night_ct | int - day_ct | int) * fraction) | round(0) | int }}"
          - service: light.turn_on
            target:
              entity_id: !input light_entity
            data:
              brightness_pct: "{{ target_bri }}"
              kelvin: "{{ target_ct }}"

    # Night / early morning: warm dim
    default:
      - service: light.turn_on
        target:
          entity_id: !input light_entity
        data:
          brightness_pct: "{{ night_bri | int }}"
          kelvin: "{{ night_ct | int }}"
